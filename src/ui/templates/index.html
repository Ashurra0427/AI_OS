<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS-AI-OS</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>JARVIS-AI-OS</h1>
      <span class="badge" id="agent-badge">Ready</span>
    </div>
    <div class="topbar-actions">
      <button id="mic-btn" class="icon-btn" title="Hold to speak (STT)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
      </button>
      <button id="tts-btn" class="icon-btn" title="Toggle voice output (TTS)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
      <button id="clear-btn" class="icon-btn" title="Clear chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </header>
  <main class="layout">
    <section class="panel chat">
      <div class="agent-bar">
        <div class="agent-pill active" data-agent="fast">Fast-Response</div>
        <div class="agent-pill" data-agent="planner">Planner</div>
        <div class="agent-pill" data-agent="research">Research</div>
        <div class="agent-pill" data-agent="coding">Coding</div>
        <div class="agent-pill" data-agent="vision">Vision</div>
        <div class="agent-pill" data-agent="communication">Communication</div>
      </div>
      <div id="chat-history" class="chat-history"></div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Ask JARVIS..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </section>
    <section class="panel side">
      <div class="card">
        <h2>Pending Actions</h2>
        <ul id="pending-actions"></ul>
      </div>
      <div class="card">
        <h2>Tool Calls</h2>
        <ul id="tool-calls"></ul>
      </div>
      <div class="card">
        <h2>Audit Log</h2>
        <ul id="audit-log"></ul>
      </div>
      <div class="card">
        <h2>System Status</h2>
        <pre id="system-status">Loading...</pre>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
